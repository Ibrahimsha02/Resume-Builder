{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
    <div class="form-section" style="max-width: 420px; margin: 40px auto;">
        <h1 style="text-align:center;">Login</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="width:100%;">Login</button>
        </form>
        <p style="text-align:center; margin-top:16px; font-size:14px; color:var(--slate);">
            Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
        </p>
    </div>
{% endblock %}
